<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九局棒球 — 技能教練傳說屬性參考手冊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --silver: #c0c8d8;
    --gold: #f0c040;
    --plat: #a8d8f0;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --purple: #bc8cff;
    --tag-bat: #1f4a2c;
    --tag-bat-t: #56d364;
    --tag-pit: #1a3a5c;
    --tag-pit-t: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2128 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .header p { color: var(--muted); font-size: 12px; }
  .nav-tabs {
    display: flex; gap: 4px; margin-top: 16px;
    flex-wrap: wrap;
  }
  .nav-tab {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    transition: all .2s;
  }
  .nav-tab:hover { color: var(--text); border-color: var(--accent); }
  .nav-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

  /* ===== LAYOUT ===== */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ===== SEARCH ===== */
  .search-box { position: relative; margin-bottom: 20px; }
  .search-box input {
    width: 100%; padding: 10px 16px 10px 40px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color .2s;
  }
  .search-box input:focus { outline: none; border-color: var(--accent); }
  .search-box::before {
    content: '🔍'; position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); font-size: 14px;
  }

  /* ===== TIER BADGES ===== */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  }
  .badge-I   { background: #1f2e1f; color: #56d364; border: 1px solid #2ea043; }
  .badge-II  { background: #2d2510; color: var(--gold); border: 1px solid #8b6914; }
  .badge-III { background: #112233; color: var(--plat); border: 1px solid #2a5a8a; }

  /* ===== INFO BOX ===== */
  .info-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px; padding: 12px 16px; margin-bottom: 16px;
    font-size: 13px; color: var(--muted);
  }
  .info-box strong { color: var(--text); }

  /* ===== FILTER CHIPS ===== */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip {
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all .15s;
  }
  .filter-chip:hover { color: var(--text); }
  .filter-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(240,192,64,0.08); }

  /* ===== TRAINER CARD ===== */
  .trainer-grid { display: flex; flex-direction: column; gap: 12px; }
  .trainer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .trainer-card:hover { border-color: var(--accent); }
  .trainer-card.hidden { display: none; }

  .card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
  .card-subtitle { font-size: 12px; color: var(--muted); }
  .card-toggle {
    width: 24px; height: 24px; display: flex; align-items: center;
    justify-content: center; color: var(--muted); font-size: 16px;
    transition: transform .2s;
  }
  .card-toggle.open { transform: rotate(180deg); }
  .card-body { padding: 0 16px 16px; }

  /* ===== LEGEND TIER BLOCK ===== */
  .tier-block { margin-top: 14px; }
  .tier-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0 6px 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .tier-prob {
    font-size: 12px; color: var(--muted); margin-left: auto;
  }
  .tier-prob span { color: var(--orange); font-weight: 700; }

  /* ===== EFFECT ROW TABLE ===== */
  .effect-table {
    width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 4px;
  }
  .effect-table th {
    background: var(--surface2); color: var(--muted);
    padding: 5px 10px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .effect-table td {
    padding: 6px 10px; border: 1px solid var(--border);
    vertical-align: middle;
  }
  .effect-table tr:hover td { background: rgba(88,166,255,0.04); }

  .etype-cell {
    text-align: center; white-space: nowrap; font-size: 12px; font-weight: 700;
  }
  .etype-base { color: #56d364; }
  .etype-skill { color: var(--plat); }

  .desc-cell { text-align: left; color: var(--muted); font-size: 12px; line-height: 1.5; }
  .desc-cell .note { color: var(--orange); font-size: 11px; display: block; margin-top: 2px; }

  .val-cell { text-align: center; }
  .val-min { color: var(--silver); font-weight: 600; font-size: 12px; }
  .val-max { color: var(--gold); font-weight: 700; font-size: 13px; }
  .val-interval { color: var(--green); font-size: 11px; }
  .val-fixed { color: var(--plat); font-weight: 700; font-size: 13px; }
  .val-dash { color: var(--border); }

  /* ===== OVERVIEW TABLE (tier probs) ===== */
  .overview-table {
    width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px;
  }
  .overview-table th {
    background: var(--surface2); color: var(--muted);
    padding: 6px 14px; border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; text-align: center;
  }
  .overview-table td {
    padding: 7px 14px; border: 1px solid var(--border);
    text-align: center; vertical-align: middle;
  }
  .overview-table tr:hover td { background: rgba(88,166,255,0.04); }

  /* ===== SCROLL TO TOP ===== */
  .back-top {
    position: fixed; bottom: 24px; right: 24px;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(88,166,255,0.3);
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .back-top.visible { opacity: 1; pointer-events: all; }

  @media (max-width: 700px) {
    .header h1 { font-size: 1.6rem; }
    .effect-table { font-size: 11px; }
    .effect-table th, .effect-table td { padding: 4px 6px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>⚡ 九局棒球 技能教練傳說屬性</h1>
    <p>傳說屬性獲得機率 · 基本效果 / 技能效果數值範圍</p>

      <button class="nav-tab" onclick="showSection('pitcher')">🎯 投手技能</button>
    </nav>
  </div>
</div>

<div class="container">

<!-- ===================== SECTION 1: 打者技能 ===================== -->

  </div>

  <div class="filter-row" id="bat-filter">

    <button class="filter-chip" onclick="setBatFilter('老手',this)">老手</button>
  </div>

  <div class="search-box">
    <input type="text" id="search-bat" placeholder="搜尋技能名稱或效果描述..." oninput="filterBat()">
  </div>

  <div class="trainer-grid" id="bat-grid"></div>
</div>

<!-- ===================== SECTION 3: 投手技能 ===================== -->
<div id="pitcher" class="section">
  <div class="info-box">
    <strong>說明：</strong>下列為投手技能教練傳說屬性的完整數值。<br>

  <div class="filter-row" id="pit-filter">

    <button class="filter-chip" onclick="setPitFilter('合力投球',this)">合力投球</button>
    <button class="filter-chip" onclick="setPitFilter('投手默契',this)">投手默契</button>
    <button class="filter-chip" onclick="setPitFilter('工作馬',this)">工作馬</button>
    <button class="filter-chip" onclick="setPitFilter('完美先生',this)">完美先生</button>
  </div>

  <div class="search-box">
    <input type="text" id="search-pit" placeholder="搜尋技能名稱或效果描述..." oninput="filterPit()">
  </div>

  <div class="trainer-grid" id="pit-grid"></div>
</div>

</div><!-- /container -->

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

// ===================== RENDER =====================
function renderCard(trainer) {
  const typeTag = trainer.type === 'bat'
    ? '<span style="background:#1f4a2c;color:#56d364;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;">打擊</span>'
    : '<span style="background:#1a3a5c;color:#58a6ff;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;">投球</span>';
  const icon = trainer.type === 'bat' ? '⚾' : '🎯';

  const tierBadges = { I: 'badge-I', II: 'badge-II', III: 'badge-III' };
  const tierColors = { I: '#56d364', II: '#f0c040', III: '#a8d8f0' };

  let tiersHtml = '';
  trainer.tiers.forEach(tier => {
    let rowsHtml = '';
    tier.rows.forEach(row => {
      const isBase = row.etype === 'base';
      const etypeLabel = isBase
        ? '<span class="etype-cell etype-base">基本效果</span>'
        : '<span class="etype-cell etype-skill">技能效果</span>';
      const noteHtml = row.note ? `<span class="note">★ ${row.note}</span>` : '';
      let valHtml = '';
      if (row.interval === null) {
        valHtml = `<td class="val-cell" colspan="3"><span class="val-fixed">${row.min}</span></td>`;
      } else if (row.min === row.max) {
        valHtml = `<td class="val-cell"><span class="val-fixed">${row.min}</span></td>
                   <td class="val-cell"><span class="val-fixed">${row.max}</span></td>
                   <td class="val-cell"><span class="val-dash">—</span></td>`;
      } else {
        valHtml = `<td class="val-cell"><span class="val-min">${row.min}</span></td>
                   <td class="val-cell"><span class="val-max">${row.max}</span></td>
                   <td class="val-cell"><span class="val-interval">${row.interval}</span></td>`;
      }
      rowsHtml += `<tr>
        <td>${etypeLabel}</td>
        <td class="desc-cell">${row.desc}${noteHtml}</td>
        ${valHtml}
      </tr>`;
    });

    tiersHtml += `<div class="tier-block">
      <div class="tier-header">
        <span class="badge ${tierBadges[tier.tier]}">${tier.tier}</span>
        <span style="font-size:13px;color:${tierColors[tier.tier]};font-weight:700;">傳說屬性 ${tier.tier}</span>
        <span class="tier-prob">獲得機率 <span>${tier.prob}</span></span>
      </div>
      <div style="overflow-x:auto">
      <table class="effect-table">
        <thead><tr>
          <th style="width:80px">效果類型</th>
          <th style="text-align:left">效果說明</th>
          <th style="width:70px">最小值</th>
          <th style="width:70px">最大值</th>
          <th style="width:60px">間隔</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      </div>
    </div>`;
  });

  const allText = trainer.tiers.flatMap(t => t.rows.map(r => r.desc)).join(' ');

  return `<div class="trainer-card" data-name="${trainer.name}" data-type="${trainer.type}" data-search="${trainer.name} ${allText}">
    <div class="card-header" onclick="toggleCard(this)">
      <span style="font-size:20px">${icon}</span>
      <div style="flex:1">
        <div class="card-title">傳說技能 — ${trainer.name}</div>
        <div class="card-subtitle">I / II / III 三階傳說屬性</div>
      </div>
      ${typeTag}
      <span class="card-toggle">▼</span>
    </div>
    <div class="card-body" style="display:none">${tiersHtml}</div>
  </div>`;
}

function buildGrid(gridId, type) {
  const grid = document.getElementById(gridId);
  const items = skillData.filter(t => t.type === type);
  grid.innerHTML = items.map(renderCard).join('');
}

// ===================== TOGGLE =====================
function toggleCard(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.card-toggle');
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  toggle.classList.toggle('open', open);
}

// ===================== FILTERS =====================
let batFilter = 'all';
let pitFilter = 'all';

function setBatFilter(name, btn) {
  batFilter = name;
  document.querySelectorAll('#bat-filter .filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  filterBat();
}

function filterBat() {
  const q = (document.getElementById('search-bat').value || '').toLowerCase();
  document.querySelectorAll('#bat-grid .trainer-card').forEach(card => {
    const matchName = batFilter === 'all' || card.dataset.name === batFilter;
    const matchQ = !q || card.dataset.search.toLowerCase().includes(q);
    card.style.display = (matchName && matchQ) ? '' : 'none';
  });
}

function setPitFilter(name, btn) {
  pitFilter = name;
  document.querySelectorAll('#pit-filter .filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  filterPit();
}

function filterPit() {
  const q = (document.getElementById('search-pit').value || '').toLowerCase();
  document.querySelectorAll('#pit-grid .trainer-card').forEach(card => {
    const matchName = pitFilter === 'all' || card.dataset.name === pitFilter;
    const matchQ = !q || card.dataset.search.toLowerCase().includes(q);
    card.style.display = (matchName && matchQ) ? '' : 'none';
  });
}

// ===================== NAV =====================
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    const ids = ['detail', 'pitcher'];
    t.classList.toggle('active', ids[i] === id);
  });
}

// ===================== SCROLL =====================
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('visible', window.scrollY > 300);
});

// ===================== INIT =====================
buildGrid('bat-grid', 'bat');
buildGrid('pit-grid', 'pit');
</script>
